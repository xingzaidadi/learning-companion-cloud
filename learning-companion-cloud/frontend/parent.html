<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>家长端 - 暑假自主学习陪跑</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell parent-shell" data-quality="parent-three-questions parent-action-focus parent-progressive-details">
      <header class="topbar">
        <div class="brand">
          <h1>家长端</h1>
          <p>只回答三个问题：今天稳不稳、哪里要管、下一步做什么。</p>
        </div>
        <nav class="nav">
          <a href="/child">孩子端</a>
          <a href="/parent">家长端</a>
          <a href="/admin">管理端</a>
        </nav>
      </header>

      <section id="parentSummary" class="parent-hero" data-quality="parent-summary-first"></section>

      <section class="parent-layout">
        <section class="card parent-action-card" data-quality="parent-action-first">
          <div class="section-head">
            <div>
              <h2>你现在只需要看这里</h2>
              <p class="muted">需要家长介入才显示为重点；没风险就让孩子自己学。</p>
            </div>
            <span id="actionLevel" class="tag ok">正常</span>
          </div>
          <div id="parentActions" class="parent-action-list"></div>
        </section>

        <aside class="card parent-side-card">
          <h2>今日操作</h2>
          <div id="report" class="muted">晚上会自动生成日报；也可以现在手动生成。</div>
          <div class="actions">
            <button id="endDay" class="primary">生成今天日报</button>
            <button id="weekReport">生成本周周报</button>
          </div>
        </aside>
      </section>

      <section class="parent-detail-grid" data-quality="parent-details-collapsed">
        <details class="card" open>
          <summary>今日任务进度</summary>
          <div id="tasks" class="task-list compact-list"></div>
        </details>

        <details class="card">
          <summary>小测与掌握度</summary>
          <div id="quizResults" class="task-list compact-list"></div>
          <div id="mastery" class="task-list compact-list"></div>
        </details>

        <details class="card">
          <summary>复习队列与提醒记录</summary>
          <div id="reviews" class="task-list compact-list"></div>
          <div id="notifications" class="task-list compact-list"></div>
        </details>

        <details class="card">
          <summary>95+ 目标与周报</summary>
          <div id="target95" class="task-list compact-list"></div>
          <div id="weeklyReport" class="muted">还没有生成周报。</div>
        </details>
      </section>
    </main>
    <div class="toast"></div>
    <script src="/static/app.js"></script>
    <script>
      const { api, toast, taskStatusTag, priorityTag } = window.LearningApp;

      function percent(value) {
        return `${Math.round((Number(value) || 0) * 100)}%`;
      }

      function taskVerb(status) {
        const map = {
          not_started: "未开始",
          in_progress: "学习中",
          paused: "已暂停",
          stuck: "卡住了",
          checking: "检查中",
          needs_revision: "要订正",
          completed: "已完成",
        };
        return map[status] || status;
      }

      function buildParentActions(data) {
        const actions = [];
        const total = Number(data.total || 0);
        const completed = Number(data.completed || 0);
        const stuck = data.stuck_tasks || [];
        const unfinished = data.unfinished_tasks || [];
        const failedQuiz = (data.quiz_results || []).filter((item) => item.status !== "completed");
        const weak = (data.target_95?.weak_points || []).slice(0, 2);
        const adjustment = data.daily_adjustment || {};

        if (!total) {
          actions.push({
            level: "warn",
            title: "今天还没有任务",
            body: "先去管理端生成今日任务，否则孩子端不会有学习内容。",
            next: "打开管理端，点击“生成计划并生成今日任务”。",
          });
        }
        stuck.slice(0, 3).forEach((task) => {
          actions.push({
            level: "danger",
            title: `孩子卡住：${task.title}`,
            body: task.description || "孩子已经点了“我卡住了”。",
            next: "先让孩子说清楚卡在哪一步，不要直接讲答案；必要时让他再点一次卡住并写具体问题。",
          });
        });
        failedQuiz.slice(0, 3).forEach((result) => {
          actions.push({
            level: "warn",
            title: `小测未过：${result.title}`,
            body: `结果 ${result.correct}/${result.total}，不要急着开新课。`,
            next: result.mastery?.next_action || "先订正错题，再做同类复测。",
          });
        });
        if (adjustment.recommendation) {
          actions.push({
            level: adjustment.should_slow_down ? "warn" : "ok",
            title: adjustment.should_slow_down ? "明天建议放慢" : "节奏正常",
            body: adjustment.recommendation,
            next: adjustment.first_step || "按今日计划继续。",
          });
        }
        weak.forEach((item) => {
          const point = item.knowledge_point || item.skill || item.lesson || item.unit || "待补知识点";
          actions.push({
            level: "warn",
            title: `薄弱点：${item.subject || "综合"} · ${point}`,
            body: `当前 ${percent(item.mastery_score)}，目标 ${percent(item.target_score)}。`,
            next: item.next_action || "明天优先安排 10 分钟补漏。",
          });
        });
        if (!actions.length && total && completed === total) {
          actions.push({
            level: "ok",
            title: "今天可以收工",
            body: "任务已完成，没有明显卡点。",
            next: "家长只需要表扬过程：按时开始、遇到问题愿意说、完成后愿意检查。",
          });
        }
        if (!actions.length) {
          actions.push({
            level: "ok",
            title: "目前不用介入",
            body: "孩子端流程正常，先让孩子自己推进。",
            next: unfinished[0] ? `下一个关注点：${unfinished[0].title}` : "等孩子完成小测后再看结果。",
          });
        }
        return actions;
      }

      function renderSummary(data) {
        const total = Number(data.total || 0);
        const completed = Number(data.completed || 0);
        const stuckCount = (data.stuck_tasks || []).length;
        const quizResults = data.quiz_results || [];
        const quizPass = quizResults.filter((item) => item.status === "completed").length;
        const progress = total ? Math.round((completed / total) * 100) : 0;
        const risk = stuckCount ? "需要介入" : quizResults.some((item) => item.status !== "completed") ? "需要订正" : total && completed === total ? "今日稳定" : "进行中";
        const riskClass = stuckCount ? "danger" : risk === "需要订正" ? "warn" : "ok";
        document.querySelector("#parentSummary").innerHTML = `
          <article class="parent-status-card ${riskClass}">
            <span class="tag ${riskClass === "danger" ? "warn" : riskClass}">${risk}</span>
            <h2>${data.date} 学习结论</h2>
            <p>${total ? `完成 ${completed}/${total}，进度 ${progress}%；小测 ${quizPass}/${quizResults.length || 0} 通过。` : "今天还没有生成任务。"}</p>
            <div class="parent-kpis">
              <span><small>任务进度</small><strong>${completed}/${total}</strong></span>
              <span><small>卡住</small><strong>${stuckCount}</strong></span>
              <span><small>待复习</small><strong>${(data.review_items || []).length}</strong></span>
            </div>
          </article>
        `;
      }

      function renderActions(data) {
        const actions = buildParentActions(data);
        const worst = actions.some((item) => item.level === "danger") ? "danger" : actions.some((item) => item.level === "warn") ? "warn" : "ok";
        const actionLevel = document.querySelector("#actionLevel");
        actionLevel.className = `tag ${worst === "danger" ? "warn" : worst}`;
        actionLevel.textContent = worst === "danger" ? "需要介入" : worst === "warn" ? "需要关注" : "正常";
        const box = document.querySelector("#parentActions");
        box.innerHTML = "";
        actions.slice(0, 5).forEach((item) => {
          const card = document.createElement("article");
          card.className = `parent-action-item ${item.level}`;
          card.innerHTML = `
            <strong>${item.title}</strong>
            <p>${item.body}</p>
            <p><span>下一步</span>${item.next}</p>
          `;
          box.append(card);
        });
      }

      function shortReportText(value, max = 72) {
        return String(value || "")
          .replace(/联调验证[-_：:]?/g, "")
          .replace(/-\d{4,}/g, "")
          .replace(/stuck 标准答案[:：]?\s*/gi, "")
          .replace(/\s+/g, " ")
          .trim()
          .slice(0, max);
      }

      function reportLine(value, fallback) {
        const text = shortReportText(value, 86);
        return text || fallback;
      }

      function renderReport(data) {
        const report = document.querySelector("#report");
        if (data.report) {
          report.classList.remove("muted");
          report.innerHTML = `
            <div class="parent-report-mini" data-quality="parent-compact-report">
              <div><span>今天结论</span><strong>${reportLine(data.report.summary, "今天已生成学习记录。")}</strong></div>
              <div><span>明天第一步</span><strong>${reportLine(data.report.tomorrow_first_step, "先从第一项任务开始。")}</strong></div>
              ${data.report.ten_minute_action ? `<div><span>家长 10 分钟</span><strong>${reportLine(data.report.ten_minute_action, "听孩子复述今天学会了什么。")}</strong></div>` : ""}
            </div>
          `;
        } else {
          report.classList.add("muted");
          report.textContent = "晚上会自动生成日报；也可以现在手动生成。";
        }
        const weekly = document.querySelector("#weeklyReport");
        if (data.weekly_report) {
          weekly.classList.remove("muted");
          weekly.innerHTML = `
            <p>${data.weekly_report.summary}</p>
            <p><strong>问题：</strong>${data.weekly_report.problems}</p>
            <p><strong>下周重点：</strong>${data.weekly_report.next_week_focus}</p>
          `;
        }
      }

      function renderDetails(data) {
        const tasks = document.querySelector("#tasks");
        tasks.innerHTML = data.tasks.length ? "" : '<p class="muted">今天还没有任务。</p>';
        data.tasks.forEach((task) => {
          const card = document.createElement("article");
          card.className = "task-card compact-card";
          card.innerHTML = `
            <div class="task-head">
              <div>
                <strong>${task.title}</strong>
                <p class="muted">${taskVerb(task.status)} · ${task.planned_start || "--"}-${task.planned_end || "--"}</p>
              </div>
              <div class="task-meta">${priorityTag(task)}${taskStatusTag(task)}</div>
            </div>
          `;
          tasks.append(card);
        });

        const quizBox = document.querySelector("#quizResults");
        quizBox.innerHTML = data.quiz_results.length ? "<h3>小测结果</h3>" : '<p class="muted">暂无小测。</p>';
        data.quiz_results.forEach((result) => {
          const card = document.createElement("article");
          card.className = "task-card compact-card";
          card.innerHTML = `
            <strong>${result.title}</strong>
            <span class="tag ${result.status === "completed" ? "ok" : "warn"}">${result.correct}/${result.total}</span>
            ${result.mastery?.next_action ? `<p class="muted">${result.mastery.next_action}</p>` : ""}
          `;
          quizBox.append(card);
        });

        const mastery = document.querySelector("#mastery");
        mastery.innerHTML = data.mastery?.length ? "<h3>掌握度结论</h3>" : "";
        (data.mastery || []).slice(0, 4).forEach((item) => {
          const card = document.createElement("article");
          card.className = "task-card compact-card";
          card.innerHTML = `
            <strong>${item.subject || "综合"} · ${item.knowledge_point || item.skill || item.lesson || item.unit || "待补知识点"}</strong>
            <span class="tag ${["A", "B"].includes(item.mastery_level) ? "ok" : "warn"}">掌握 ${item.mastery_level}</span>
            <p class="muted">${item.next_action}</p>
          `;
          mastery.append(card);
        });

        const reviews = document.querySelector("#reviews");
        reviews.innerHTML = data.review_items.length ? "<h3>复习队列</h3>" : '<p class="muted">暂无待复习错题/卡点。</p>';
        data.review_items.slice(0, 8).forEach((item) => {
          const card = document.createElement("article");
          card.className = "task-card compact-card";
          card.innerHTML = `
            <strong>${item.question}</strong>
            <p class="muted">${item.review_stage || "D1"} · 到期 ${item.due_date} · ${item.reason}</p>
          `;
          reviews.append(card);
        });

        const logs = document.querySelector("#notifications");
        logs.innerHTML = data.notifications.length ? "<h3>提醒记录</h3>" : "";
        data.notifications.slice(0, 5).forEach((log) => {
          const card = document.createElement("article");
          card.className = "task-card compact-card";
          card.innerHTML = `<strong>${log.event_type} · ${log.status}</strong><p class="muted">${log.message.replaceAll("\n", "<br>")}</p>`;
          logs.append(card);
        });

        const targetBox = document.querySelector("#target95");
        const target = data.target_95 || {};
        targetBox.innerHTML = `
          <article class="task-card compact-card">
            <strong>${target.headline || "正在建立 95+ 学习画像"}</strong>
            <p class="muted">准备度：${target.readiness_score ?? "--"}；薄弱点 ${(target.weak_points || []).length} 个。</p>
          </article>
        `;
      }

      async function loadDashboard() {
        const data = await api("/api/parent/dashboard");
        renderSummary(data);
        renderActions(data);
        renderReport(data);
        renderDetails(data);
      }

      document.querySelector("#endDay").addEventListener("click", async () => {
        const report = await api("/api/day/end", { method: "POST" });
        toast(report.summary);
        await loadDashboard();
      });

      document.querySelector("#weekReport").addEventListener("click", async () => {
        const report = await api("/api/week/report", { method: "POST" });
        toast(report.summary);
        await loadDashboard();
      });

      loadDashboard().catch((error) => toast(error.message));
      setInterval(loadDashboard, 30000);
    </script>
  </body>
</html>
