<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>孩子端 - 暑假自主学习陪跑</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <h1>今天只做下一步</h1>
          <p>不用想太多，点开始，然后完成一张任务卡。</p>
        </div>
        <nav class="nav">
          <a href="/child">孩子端</a>
        </nav>
      </header>

      <section class="card hero">
        <div>
          <div class="muted">今天进度</div>
          <div class="progress-number"><span id="doneCount">0</span><small> / <span id="totalCount">0</span></small></div>
        </div>
        <button id="startNext" class="primary big-action">开始下一个任务</button>
      </section>

      <section class="grid" style="margin-top:16px">
        <div class="card span-8">
          <h2>今日任务</h2>
          <div id="tasks" class="task-list"><p class="muted">正在加载今日任务...</p></div>
        </div>
        <div class="card span-4">
          <h2>小测 / 检查</h2>
          <div id="quizBox" class="muted">完成任务后，这里会出现 3 道检查题。</div>
          <div id="assistBox" class="muted" style="margin-top:16px">如果卡住了，AI 会先给提示，不会直接报答案。</div>
        </div>
      </section>
    </main>
    <div class="toast"></div>
    <script src="/static/app.js"></script>
    <script>
      const { api, postEvent, toast, taskStatusTag, priorityTag, checkMethodTag } = window.LearningApp;
      let tasks = [];
      let activeTaskId = null;
      let timerHandle = null;
      const pendingActions = new Set();

      async function loadTasks() {
        const container = document.querySelector("#tasks");
        container.innerHTML = '<p class="muted">正在加载今日任务...</p>';
        tasks = await api(`/api/daily-tasks?_=${Date.now()}`, { cache: "no-store" });
        if (!Array.isArray(tasks)) {
          tasks = tasks.value || [];
        }
        renderTasks();
        const checkingTask = tasks.find((task) => task.status === "checking");
        if (checkingTask) await showQuiz(checkingTask.id);
      }

      function renderTasks() {
        const done = tasks.filter((task) => task.status === "completed").length;
        document.querySelector("#doneCount").textContent = done;
        document.querySelector("#totalCount").textContent = tasks.length;
        const container = document.querySelector("#tasks");
        container.innerHTML = "";
        if (!tasks.length) {
          container.innerHTML = '<p class="muted">今天还没有任务，请让家长在管理端生成。</p>';
          document.querySelector("#startNext").disabled = true;
          return;
        }
        document.querySelector("#startNext").disabled = false;
        tasks.forEach((task) => container.append(createTaskCard(task)));
        updateTimers();
      }

      function createTaskCard(task) {
        const card = document.createElement("article");
        card.dataset.taskId = String(task.id);
        updateTaskCardElement(card, task);
        return card;
      }

      function taskCardHtml(task) {
        const isRunning = task.timer_state === "running";
        const renderedAt = isRunning ? Date.now() : 0;
        const startDisabled = ["in_progress", "checking", "completed"].includes(task.status) ? "disabled" : "";
        const pauseDisabled = task.status !== "in_progress" ? "disabled" : "";
        const doneAction = task.status === "checking" ? "showQuiz" : "complete";
        const doneLabel = task.status === "checking"
          ? "继续检查"
          : task.status === "completed"
            ? "已通过"
            : task.status === "not_started"
              ? "先点开始"
              : task.status === "needs_revision"
                ? "订正后重新检查"
                : "我做完了，开始检查";
        const doneDisabled = ["not_started", "completed"].includes(task.status) ? "disabled" : "";
        const stuckDisabled = ["checking", "completed"].includes(task.status) ? "disabled" : "";
        return `
          <div class="task-head">
            <div>
              <h3 class="task-title">${task.title}</h3>
              <p class="muted">${task.description}</p>
            </div>
            <div class="task-meta">${priorityTag(task)}${taskStatusTag(task)}</div>
          </div>
          <div class="task-meta">
            <span class="tag">${task.estimated_minutes} 分钟</span>
            <span class="tag timer-tag" data-elapsed="${Number(task.elapsed_seconds || 0)}" data-rendered-at="${renderedAt}" data-state="${task.timer_state || "stopped"}">已学 ${formatElapsed(task.elapsed_seconds || 0)}</span>
            ${checkMethodTag(task)}
          </div>
          <p><strong>完成标准：</strong>${task.completion_standard}</p>
          <div class="actions">
            <button class="primary" data-action="start" data-id="${task.id}" ${startDisabled}>开始</button>
            <button data-action="pause" data-id="${task.id}" ${pauseDisabled}>暂停</button>
            <button class="warn" data-action="${doneAction}" data-id="${task.id}" ${doneDisabled}>${doneLabel}</button>
            <button class="danger" data-action="stuck" data-id="${task.id}" ${stuckDisabled}>我卡住了</button>
          </div>
        `;
      }

      function updateTaskCardElement(card, task) {
        card.className = `task-card ${task.id === activeTaskId || task.status === "in_progress" ? "active" : ""}`;
        card.innerHTML = taskCardHtml(task);
      }

      function mergeTaskResult(taskId, result) {
        const index = tasks.findIndex((task) => task.id === taskId);
        if (index < 0) return null;
        tasks[index] = { ...tasks[index], ...result };
        return tasks[index];
      }

      function updateOneTask(taskId, result) {
        const task = mergeTaskResult(taskId, result);
        if (!task) return;
        const card = document.querySelector(`#tasks .task-card[data-task-id="${taskId}"]`);
        if (card) updateTaskCardElement(card, task);
        document.querySelector("#doneCount").textContent = tasks.filter((item) => item.status === "completed").length;
        updateTimers();
      }

      function formatElapsed(seconds) {
        const total = Math.max(0, Math.floor(Number(seconds || 0)));
        const minutes = Math.floor(total / 60);
        const rest = total % 60;
        return `${minutes}:${String(rest).padStart(2, "0")}`;
      }

      function updateTimers() {
        document.querySelectorAll(".timer-tag").forEach((node) => {
          const base = Number(node.dataset.elapsed || 0);
          const renderedAt = Number(node.dataset.renderedAt || 0);
          const running = node.dataset.state === "running" && renderedAt > 0;
          const extra = running ? Math.floor((Date.now() - renderedAt) / 1000) : 0;
          node.textContent = `已学 ${formatElapsed(base + extra)}`;
        });
      }

      async function startNext() {
        const next = tasks.find((task) => !["completed", "in_progress"].includes(task.status));
        if (!next) {
          await endDay();
          return;
        }
        const result = await postEvent(next.id, "start");
        activeTaskId = next.id;
        updateOneTask(next.id, result);
        toast(`已开始计时：${next.title}`);
      }

      async function showQuiz(taskId) {
        const data = await api(`/api/daily-tasks/${taskId}/quiz`);
        const box = document.querySelector("#quizBox");
        box.classList.remove("muted");
        box.innerHTML = `<h3>${data.task.title}</h3>`;
        const form = document.createElement("form");
        const typeLabels = {
          chinese_word_dictation: "语文听写",
          chinese_pinyin: "拼音",
          chinese_char_group: "组词",
          chinese_word_explain: "词义",
          chinese_sentence_understand: "理解",
          chinese_summary: "概括",
          chinese_expression: "表达",
          english_word_cn_to_en: "中译英",
          english_word_en_to_cn: "英译中",
          english_spelling: "英文默写",
          english_sentence_fill: "句型填空",
          english_translation: "翻译",
          english_reading_check: "课文理解",
          english_sentence_make: "英文造句",
          math_exact: "精确计算",
          math_concept_choice: "概念判断",
          math_step_explain: "步骤说明",
          math_word_problem: "应用题",
          math_error_reason: "错因判断",
          math_variant: "同类变式",
        };
        const compactInputTypes = new Set([
          "exact",
          "chinese_word_dictation",
          "chinese_pinyin",
          "chinese_char_group",
          "english_word_cn_to_en",
          "english_word_en_to_cn",
          "english_spelling",
          "english_sentence_fill",
          "math_exact",
          "math_word_problem",
          "math_variant",
        ]);
        const placeholders = {
          chinese_word_dictation: "请输入听写词语，注意汉字字形",
          chinese_pinyin: "例如：lù 或 lu4",
          english_spelling: "请输入英文单词",
          english_sentence_fill: "只填空缺处",
          math_exact: "只写答案，带单位也可以",
          math_word_problem: "写列式或答案，注意单位",
          math_step_explain: "写清先做什么、再做什么、为什么",
        };
        data.items.forEach((item) => {
          const wrapper = document.createElement("div");
          wrapper.className = "quiz-item";
          const label = typeLabels[item.question_type] || (item.question_type === "choice" ? "选择题" : "小测题");
          if (item.options && item.options.length) {
            wrapper.innerHTML = `<span class="tag">${label}</span><strong>${item.question}</strong>${item.options
              .map((option) => `<label><input type="radio" name="${item.id}" value="${option}" /> ${option}</label>`)
              .join("")}`;
          } else if (compactInputTypes.has(item.question_type)) {
            wrapper.innerHTML = `<label><span class="tag">${label}</span><strong>${item.question}</strong><input name="${item.id}" placeholder="${placeholders[item.question_type] || "输入答案"}" /></label>`;
          } else {
            wrapper.innerHTML = `<label><span class="tag">${label}</span><strong>${item.question}</strong><textarea name="${item.id}" placeholder="${placeholders[item.question_type] || "写出思路或完整句子"}"></textarea></label>`;
          }
          form.append(wrapper);
        });
        const submit = document.createElement("button");
        submit.className = "primary";
        submit.textContent = "提交小测";
        form.append(submit);
        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          if (submit.disabled) return;
          submit.disabled = true;
          submit.textContent = "正在检查...";
          const answers = {};
          new FormData(form).forEach((value, key) => {
            answers[key] = value;
          });
          try {
            const result = await api(`/api/daily-tasks/${taskId}/quiz`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ answers }),
            });
            toast(result.already_checked ? "这次小测已经检查过了" : `小测结果：${result.correct}/${result.total}`);
            await loadTasks();
            if (result.status === "completed") {
              box.innerHTML = `<p>真棒，检查通过：${result.correct}/${result.total}</p><p class="muted">${result.mastery?.next_action || "继续保持。"}</p>`;
            } else {
              const wrongHtml = (result.wrong_items || []).map((item) => `
                <div class="quiz-item">
                  <strong>${escapeHtml(item.error_type || "错因")}：${escapeHtml(item.question)}</strong>
                  <p>你的答案：${escapeHtml(item.your_answer || "未作答")}</p>
                  <p>订正答案：${escapeHtml(item.answer)}</p>
                  <p class="muted">${escapeHtml(item.next_action || item.explanation)}</p>
                </div>
              `).join("");
              box.innerHTML = `<p>需要订正：${result.correct}/${result.total}</p>${wrongHtml}`;
            }
          } catch (error) {
            submit.disabled = false;
            submit.textContent = "提交小测";
            toast(error.message);
          }
        });
        box.append(form);
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function showStuckAssistance(result) {
        const box = document.querySelector("#assistBox");
        const assistance = result.assistance || {};
        const sourceText = result.assistant_source === "ai" ? "AI 辅导" : "本地辅导";
        box.classList.remove("muted");
        box.innerHTML = `
          <h3>当前卡住：${escapeHtml(result.task_title || "这项任务")}</h3>
          <p class="muted">${escapeHtml(sourceText)} · 你的问题：${escapeHtml(result.child_note || "还没有填写具体问题")}</p>
          <p>${escapeHtml(assistance.encouragement || "直接按下面步骤做。")}</p>
          <div class="quiz-item">
            <strong>你现在要做</strong>
            <p>${escapeHtml(assistance.hint_1 || "先只做第一步。")}</p>
          </div>
          <div class="quiz-item">
            <strong>如果还不行</strong>
            <p>${escapeHtml(assistance.try_again || assistance.guiding_question || "把具体不会的词、句子或步骤写出来。")}</p>
          </div>
          <details>
            <summary>为什么这样做</summary>
            <p>${escapeHtml(assistance.likely_blocker || "任务要求或第一步还没想清楚。")}</p>
            <p>${escapeHtml(assistance.guiding_question || "这项任务真正问你的是什么？")}</p>
            <p>${escapeHtml(assistance.mini_example || "先把任务拆成看懂要求、完成第一步、检查答案。")}</p>
          </details>
          <p class="muted">${escapeHtml(result.review_action || "这次卡住点会进入后续补漏复习。")}</p>
        `;
      }

      async function endDay() {
        const report = await api("/api/day/end", { method: "POST" });
        toast(`今天结束：${report.summary}`);
      }

      document.querySelector("#startNext").addEventListener("click", startNext);
      document.querySelector("#tasks").addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const taskId = Number(button.dataset.id);
        const action = button.dataset.action;
        const pendingKey = `${taskId}:${action}`;
        if (pendingActions.has(pendingKey) || button.disabled) return;
        pendingActions.add(pendingKey);
        button.disabled = true;
        const originalText = button.textContent;
        if (action === "complete") button.textContent = "正在出题...";
        if (action === "showQuiz") button.textContent = "正在打开...";
        try {
          if (action === "stuck") {
            const note = prompt("卡在哪里？写一句话就行：") || "";
            activeTaskId = taskId;
            const result = await postEvent(taskId, "stuck", note);
            updateOneTask(taskId, result);
            showStuckAssistance(result);
            toast(result.assistant_source === "ai" ? "AI 已给你一个提示，先试 3 分钟" : "已给你一个本地提示，先试 3 分钟");
          } else if (action === "complete") {
            const result = await postEvent(taskId, "complete");
            updateOneTask(taskId, result);
            await showQuiz(taskId);
          } else if (action === "showQuiz") {
            await showQuiz(taskId);
            button.disabled = false;
            button.textContent = originalText;
          } else {
            const result = await postEvent(taskId, action);
            if (action === "start") activeTaskId = taskId;
            updateOneTask(taskId, result);
            toast(action === "start" ? `已开始计时：${formatElapsed(result.elapsed_seconds || 0)}` : `已暂停，已学 ${formatElapsed(result.elapsed_seconds || 0)}`);
          }
        } catch (error) {
          button.disabled = false;
          button.textContent = originalText;
          toast(error.message);
        } finally {
          pendingActions.delete(pendingKey);
        }
      });

      if (tasks.length) {
        renderTasks();
      }

      loadTasks().catch((error) => {
        document.querySelector("#tasks").innerHTML = `<p class="muted">今日任务加载失败：${escapeHtml(error.message)}</p>`;
        toast(error.message);
      });
      timerHandle = setInterval(updateTimers, 1000);
    </script>
  </body>
</html>
