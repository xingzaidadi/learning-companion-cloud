suite:
  id: AGENT-CORE-FULL-20260704
  name: 学习陪跑 Agent Core 完整测试用例集
  mode: full_case_generation
  target: learning-companion-cloud
  baseline_commits:
    - b1b2732 Implement agent core learning loop
    - be510e2 Add learning materials integration

traceability_sources:
  requirements:
    REQ-PLAN-001: 家长输入目标或资料后自动生成长期计划和今日任务。
    REQ-TASK-001: 今日任务按 P0 补漏、P1 新课、P2 拓展优先级生成。
    REQ-CHILD-001: 孩子端支持开始、暂停、完成检查、卡住四按钮和计时。
    REQ-STUCK-001: 卡住辅导只作用于当前任务，并给具体下一步。
    REQ-QUIZ-CN-001: 语文覆盖听写、拼音、组词、词义、理解、概括、表达。
    REQ-QUIZ-EN-001: 英语覆盖默写、互译、填空、翻译、课文理解、造句。
    REQ-QUIZ-MA-001: 数学覆盖计算、概念、步骤、应用、错因、变式。
    REQ-GRADE-001: 批改输出分数、错因、掌握度、下一步动作。
    REQ-REVIEW-001: 错题进入 D1/D3/D7 间隔复习。
    REQ-REPORT-001: 家长端输出老师式日报、风险和 10 分钟介入建议。
    REQ-MATERIAL-001: 学习资料库资料可参与任务和小测生成。
    REQ-AI-001: AI 参与计划、出题、开放题批改、卡住、报告；AI 不通必须规则兜底。
    REQ-SCOPE-001: 不超出武汉五年级上册语数英范围。
  code:
    CODE-DB-001: backend/db.py 数据表初始化与迁移。
    CODE-PLAN-001: backend/plan_generator.py 与 backend/agent.py 生成计划和任务。
    CODE-QUIZ-001: backend/question_engine.py 三科题型生成。
    CODE-GRADE-001: backend/quiz.py 批改、错因、掌握度、补漏入队。
    CODE-REPORT-001: backend/report.py 日报/周报。
    CODE-UI-001: frontend/admin.html、frontend/child.html、frontend/parent.html 三端页面。
  risks:
    RISK-EMPTY-DB-001: 空库或老库迁移失败导致页面不可用。
    RISK-AI-FALLBACK-001: AI 失败导致孩子端或管理端不可用。
    RISK-QUIZ-LEAK-001: 孩子端小测泄露标准答案。
    RISK-CROSS-TASK-001: 点击卡住误把多个任务标为卡住。
    RISK-OVER-SCOPE-001: 出题超出五年级上册范围。
    RISK-ENC-001: 中文页面或源码出现乱码。
    RISK-SECRET-001: API Key、learning.db、报告文件误提交。
    RISK-UI-BUTTON-001: 页面按钮存在但点击无效果。
    RISK-MATERIAL-001: 资料录入后没有被小测引用。

coverage_map:
  admin_plan_and_materials:
    requirements: [REQ-PLAN-001, REQ-MATERIAL-001, REQ-AI-001]
    cases: [AC-ADM-001, AC-ADM-002, AC-ADM-003, AC-ADM-004, AC-ADM-005, AC-MAT-001, AC-MAT-002, AC-MAT-003]
  daily_tasks_and_priority:
    requirements: [REQ-TASK-001, REQ-REVIEW-001]
    cases: [AC-TASK-001, AC-TASK-002, AC-TASK-003, AC-TASK-004, AC-TASK-005]
  child_workflow:
    requirements: [REQ-CHILD-001, REQ-STUCK-001]
    cases: [AC-CHILD-001, AC-CHILD-002, AC-CHILD-003, AC-CHILD-004, AC-CHILD-005, AC-CHILD-006, AC-STUCK-001, AC-STUCK-002, AC-STUCK-003, AC-STUCK-004]
  quiz_generation:
    requirements: [REQ-QUIZ-CN-001, REQ-QUIZ-EN-001, REQ-QUIZ-MA-001, REQ-SCOPE-001]
    cases: [AC-QUIZ-CN-001, AC-QUIZ-CN-002, AC-QUIZ-CN-003, AC-QUIZ-EN-001, AC-QUIZ-EN-002, AC-QUIZ-EN-003, AC-QUIZ-MA-001, AC-QUIZ-MA-002, AC-QUIZ-MA-003, AC-QUIZ-SCOPE-001]
  grading_review_report:
    requirements: [REQ-GRADE-001, REQ-REVIEW-001, REQ-REPORT-001]
    cases: [AC-GRADE-001, AC-GRADE-002, AC-GRADE-003, AC-GRADE-004, AC-REVIEW-001, AC-REVIEW-002, AC-REPORT-001, AC-REPORT-002, AC-REPORT-003]
  ai_and_resilience:
    requirements: [REQ-AI-001]
    cases: [AC-AI-001, AC-AI-002, AC-AI-003, AC-AI-004]
  data_security_regression:
    requirements: [REQ-SCOPE-001]
    cases: [AC-DATA-001, AC-DATA-002, AC-DATA-003, AC-REG-001, AC-REG-002, AC-REG-003, AC-REG-004]

case_template: 每条用例包含 id、title、priority、level、type、traceability、preconditions、data、steps、expected、automation_candidate、current_automation、status。

