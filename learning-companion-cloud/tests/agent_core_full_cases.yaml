quality_gates:
  - gate: P0 自动化门禁
    command: python .\scripts\self_test.py
    expected: SELF_TEST_OK
  - gate: UI 点击门禁
    command: python .\scripts\ui_click_test.py
    expected: UI_CLICK_TEST_OK
  - gate: 用例结构门禁
    command: python .\scripts\validate_agent_core_cases.py
    expected: AGENT_CORE_CASES_OK
  - gate: 敏感信息门禁
    command: git diff --cached | Select-String -Pattern 'sk-[A-Za-z0-9]{20,}'
    expected: 无输出

open_questions:
  - id: OQ-AI-001
    question: 是否在 CI 中接入真实 AI smoke 测试？
    impact: 当前自动化默认禁用 AI，避免消耗 key；真实 AI 连通性仍建议上线前人工执行 /api/ai/check。
  - id: OQ-AUTH-001
    question: 生产部署是否强制启用 child/parent/admin 密码？
    impact: 当前本地默认无密码，若上云应补角色鉴权负例。
  - id: OQ-CONTENT-001
    question: 后续是否补齐武汉实际使用教材资料 PDF 的结构化提取？
    impact: 资料增强目前支持手动粘贴摘要、词表、听写词、音频清单。

execution_summary:
  last_run:
    commands:
      - python .\scripts\validate_agent_core_cases.py
      - python .\scripts\self_test.py
      - python .\scripts\ui_click_test.py
    result: passed
    notes: 新增或修改生产代码后必须重新执行三道门禁。
