name: QA Gate

on:
  push:
  pull_request:

jobs:
  qa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learning-companion-cloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/senior_qa_gate.py
      - run: python scripts/self_test.py
      - run: python scripts/db_concurrency_test.py
      - run: python scripts/child_flow_integration_test.py
      - run: python scripts/ui_design_rubric.py
      - run: python scripts/simulate_7_day_learning.py
      - run: python scripts/generate_interview_pack.py
      - run: python scripts/generate_eval_dashboard.py
      - run: python scripts/quality_95_gate.py
