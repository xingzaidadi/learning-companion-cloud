name: Agent Eval

on:
  push:
  pull_request:

jobs:
  agent-eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learning-companion-cloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python eval_harness/runners/eval_runner.py --agent learning_agent
      - run: python eval_harness/runners/eval_runner.py --agent demo_agent
